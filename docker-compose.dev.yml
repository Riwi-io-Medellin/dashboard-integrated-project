services:
  db:
    image: postgres:15-alpine
    container_name: dashboard_ip_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dashboard_ip}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dashboard_ip_dev_2024}
      POSTGRES_DB: ${POSTGRES_DB:-dashboard_integrated_project_development}
    ports:
      - "5434:5432"
    volumes:
      - dashboard_ip_postgres_data:/var/lib/postgresql/data
    networks:
      - dashboard_ip_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dashboard_ip}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: dashboard_ip_redis
    ports:
      - "6380:6379"
    volumes:
      - dashboard_ip_redis_data:/data
    networks:
      - dashboard_ip_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: dashboard_ip_web
    command: bash -c "./docker-entrypoint.dev.sh"
    ports:
      - "5000:5000"
    volumes:
      - .:/rails
      - bundle_cache:/usr/local/bundle
    environment:
      RAILS_ENV: development
      POSTGRES_USER: ${POSTGRES_USER:-dashboard_ip}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dashboard_ip_dev_2024}
      POSTGRES_DB: ${POSTGRES_DB:-dashboard_integrated_project_development}
      DATABASE_HOST: db
      DATABASE_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - dashboard_ip_network
    stdin_open: true
    tty: true

volumes:
  dashboard_ip_postgres_data:
  dashboard_ip_redis_data:
  bundle_cache:

networks:
  dashboard_ip_network:
    name: dashboard_ip_network
    driver: bridge
