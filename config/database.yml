# PostgreSQL configuration for Dashboard Integrated Project
default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  database: <%= ENV.fetch("POSTGRES_DB") { "dashboard_integrated_project_development" } %>
  username: <%= ENV.fetch("POSTGRES_USER") { "dashboard_ip" } %>
  password: <%= ENV.fetch("POSTGRES_PASSWORD") { "" } %>
  host: <%= ENV.fetch("DATABASE_HOST") { "localhost" } %>
  port: <%= ENV.fetch("DATABASE_PORT") { "5432" } %>

test:
  <<: *default
  database: dashboard_integrated_project_test
  username: <%= ENV.fetch("POSTGRES_USER") { "dashboard_ip" } %>
  password: <%= ENV.fetch("POSTGRES_PASSWORD") { "" } %>
  host: <%= ENV.fetch("DATABASE_HOST") { "localhost" } %>
  port: <%= ENV.fetch("DATABASE_PORT") { "5432" } %>

<% if ENV["DATABASE_URL"].present? %>
production:
  <<: *default
  url: <%= ENV["DATABASE_URL"] %>
<% else %>
production:
  <<: *default
  database: <%= ENV.fetch("POSTGRES_DB") { "dashboard_integrated_project_production" } %>
  username: <%= ENV.fetch("POSTGRES_USER") { "dashboard_ip" } %>
  password: <%= ENV.fetch("POSTGRES_PASSWORD") { "" } %>
  host: <%= ENV.fetch("DATABASE_HOST") { "localhost" } %>
  port: <%= ENV.fetch("DATABASE_PORT") { "5432" } %>
<% end %>
